<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Local 3D</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    margin: 8px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(45deg, #ff6ec4, #7873f5);
    color: white;
    transition: 0.3s;
    position: relative;
    z-index: 2;
}

button:hover {
    transform: scale(1.1);
}

#ball {
    width: 120px;
    height: 120px;
    margin: 40px auto;
    border-radius: 50%;
    background: red;
    box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5),
                inset 10px 10px 20px rgba(255,255,255,0.2);
    transition: all 0.4s ease;
    position: relative;
    z-index: 1;
}

#content {
    margin-top: 20px;
}

.item {
    display: inline-block;
    padding: 10px;
    margin: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Hello 3Dier 👋</h1>

<div id="ball"></div>

<button onclick="showColors()">Colours</button>
<button onclick="showSizes()">Sizes & Prices</button>

<div id="content"></div>

<script>
let ball = document.getElementById("ball");

let basePrice = 0;
let extraCost = 0;

/* Show Colors */
function showColors() {
    document.getElementById("content").innerHTML = `
        <h2>Pick a Colour</h2>

        <div class="item" onclick="changeColor('red', 0)">Red</div>
        <div class="item" onclick="changeColor('purple', 0)">Purple</div>
        <div class="item" onclick="changeColor('pink', 0)">Pink</div>
        <div class="item" onclick="changeColor('green', 0)">Green</div>
        <div class="item" onclick="changeColor('black', 0)">Black</div>

        <div class="item" onclick="changeColor('rainbow', 3)">Rainbow Gold (+3 Rs)</div>
        <div class="item" onclick="changeColor('matte', 3)">Matte Black (+3 Rs)</div>
        <div class="item" onclick="changeColor('squishy', 5)">Squishy Black (+5 Rs)</div>

        <div class="item" onclick="changeColor('silver', 0)">Silver</div>
        <div class="item" onclick="changeColor('grey', 0)">Grey</div>
        <div class="item" onclick="changeColor('rgba(255,255,255,0.4)', 0)">Translucent</div>
    `;
    updatePrice();
}

/* Show Sizes */
function showSizes() {
    document.getElementById("content").innerHTML = `
        <h2>Pick Size</h2>
        <div class="item" onclick="changeSize(100, 10)">100mm — 10 Rs</div>
        <div class="item" onclick="changeSize(150, 20)">150mm — 20 Rs</div>
        <div class="item" onclick="changeSize(200, 25)">200mm — 25 Rs</div>
    `;
    updatePrice();
}

/* Change Color */
function changeColor(color, extra) {
    extraCost = extra;

    if (color === "rainbow") {
        ball.style.background = `
            radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), transparent 40%),
            linear-gradient(120deg, 
                #d4af37,
                #ff6ec4,
                #f9d423,
                #24c6dc,
                #ab47bc,
                #d4af37
            )
        `;
        ball.style.backgroundSize = "200% 200%";

    } else if (color === "matte") {
        ball.style.background = "#222";

    } else if (color === "squishy") {
        ball.style.background = "#111";
        ball.style.boxShadow = `
            inset -20px -20px 30px rgba(0,0,0,0.8),
            inset 20px 20px 30px rgba(255,255,255,0.05)
        `;

    } else {
        ball.style.background = color;
        ball.style.boxShadow = `
            inset -10px -10px 20px rgba(0,0,0,0.5),
            inset 10px 10px 20px rgba(255,255,255,0.2)
        `;
    }

    updatePrice();
}

/* Change Size */
function changeSize(size, price) {
    let scale = size / 120;
    ball.style.transform = "scale(" + scale + ")";
    basePrice = price;
    updatePrice();
}

/* Update Price */
function updatePrice() {
    let total = basePrice + extraCost;

    let oldPrice = document.getElementById("priceDisplay");
    if (oldPrice) oldPrice.remove();

    let priceBox = document.createElement("h3");
    priceBox.id = "priceDisplay";

    if (basePrice === 0) {
        priceBox.innerText = "Select a size to see price";
    } else {
        priceBox.innerText = "Total Price: " + total + " Rs";
    }

    document.getElementById("content").appendChild(priceBox);
}
</script>

</body>
</html>
